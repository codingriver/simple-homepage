# ══════════════════════════════════════════════════════════════════════
# Nginx 完整反代参数模板 - proxy_params_full  v1.3
#
# 用法：在任意 location 块中 include 本文件
#   location / {
#       proxy_pass http://后端IP;
#       include /etc/nginx/proxy_params_full;
#   }
# 覆盖场景：普通网站/API/WebSocket/SSE/视频流/大文件/断点续传
#           SSH over WebSocket/CORS/Basic Auth/Cookie/Bearer Token
# ══════════════════════════════════════════════════════════════════════


# ┌──────────────────────────────────────────────────────────────────┐
# │  第一组：协议版本                                                 │
# └──────────────────────────────────────────────────────────────────┘

# 使用 HTTP/1.1 与后端通信。
# HTTP/1.0 不支持 keep-alive 和 WebSocket 协议升级，必须设为 1.1
proxy_http_version              1.1;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第二组：WebSocket / SSE / 协议升级                               │
# │  适用：WebSocket 应用、ttyd/wetty 终端、SSE 推送、实时通信         │
# └──────────────────────────────────────────────────────────────────┘

# 透传客户端发来的协议升级头（WebSocket 握手时值为 "websocket"）
# 若客户端未发送 Upgrade 头，$http_upgrade 为空字符串，不影响普通 HTTP
proxy_set_header                Upgrade                         $http_upgrade;

# 控制连接行为：有 Upgrade 时值为 "upgrade"（升级协议），无则为 "close"
# 直接写 "upgrade" 适配通用透传场景，无需区分 WebSocket 和普通 HTTP
proxy_set_header                Connection                      "upgrade";

# WebSocket 握手扩展协商头（如压缩扩展 permessage-deflate）
# 部分 WebSocket 客户端会携带此头，透传确保扩展协商成功
proxy_set_header                Sec-WebSocket-Extensions        $http_sec_websocket_extensions;

# WebSocket 握手密钥，服务端用于生成 Sec-WebSocket-Accept 响应
# 必须透传，否则 WebSocket 握手失败（101 Switching Protocols 无法建立）
proxy_set_header                Sec-WebSocket-Key               $http_sec_websocket_key;

# WebSocket 协议版本号（当前标准为 13），服务端校验用
proxy_set_header                Sec-WebSocket-Version           $http_sec_websocket_version;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第三组：客户端真实信息透传                                       │
# │  适用：后端日志、IP 限流、地理位置、访问控制                       │
# └──────────────────────────────────────────────────────────────────┘

# 透传原始请求目标域名（如 nav.yourdomain.com）
# 后端 Nginx 按 Host 路由到对应 server 块，不透传后端收到的是代理 IP
proxy_set_header                Host                            $host;

# 透传客户端真实 IP（$remote_addr 是直连 Nginx 的 IP）
# 若前面还有 CDN，需先在 nginx.conf 配置 set_real_ip_from 还原真实 IP
proxy_set_header                X-Real-IP                       $remote_addr;

# 部分 PHP 框架读取 REMOTE-HOST 而非 X-Real-IP，保持相同值确保兼容
proxy_set_header                REMOTE-HOST                     $remote_addr;

# 透传完整 IP 链路（格式：客户端IP, 代理1IP, 代理2IP）
# $proxy_add_x_forwarded_for 在原有头基础上追加 $remote_addr
# 注意：可被客户端伪造，安全场景优先使用 X-Real-IP
proxy_set_header                X-Forwarded-For                 $proxy_add_x_forwarded_for;

# 透传原始请求协议（http 或 https）
# 后端据此判断是否需要强制跳转 HTTPS，或生成正确的绝对 URL
proxy_set_header                X-Forwarded-Proto               $scheme;

# 透传原始 Host 头（与 Host 相同，兼容部分框架的不同读取方式）
proxy_set_header                X-Forwarded-Host                $host;

# 透传原始请求端口（HTTP 为 80，HTTPS 为 443）
# 后端生成重定向 URL 时需要此信息以构造正确端口
proxy_set_header                X-Forwarded-Port                $server_port;

# 透传完整请求路径和查询字符串（如 /api/user?id=1）
# 路径被重写时保留原始 URI，便于后端日志和审计
proxy_set_header                X-Original-URI                  $request_uri;

# 透传原始请求方法（GET/POST/PUT/DELETE 等）
# 内部跳转时保留原始方法，便于后端审计
proxy_set_header                X-Original-Method               $request_method;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第四组：认证头透传                                               │
# │  适用：Basic Auth、Bearer Token、JWT、Session Cookie              │
# └──────────────────────────────────────────────────────────────────┘

# 透传 HTTP 认证头（格式："Basic base64" 或 "Bearer token"）
# 不透传则后端收不到认证信息，导致 401 Unauthorized
proxy_set_header                Authorization                   $http_authorization;

# 透传客户端所有 Cookie（Session ID、登录态、CSRF Token 等）
# 不透传则后端无法识别已登录用户，Session 失效
proxy_set_header                Cookie                          $http_cookie;

# 允许后端 Set-Cookie 响应头透传给客户端
# 不配置则 Nginx 过滤掉 Set-Cookie，客户端无法设置 Cookie，登录功能失效
proxy_pass_header               Set-Cookie;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第五组：请求头和请求体完整透传                                    │
# └──────────────────────────────────────────────────────────────────┘

# 确保所有请求头都透传给后端（默认开启，显式声明避免被意外覆盖）
proxy_pass_request_headers      on;

# 确保请求体（POST/PUT 数据）透传给后端（默认开启，显式声明）
proxy_pass_request_body         on;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第六组：断点续传 / 分片下载                                      │
# │  适用：大文件下载、视频拖进度条、迅雷等下载工具                    │
# └──────────────────────────────────────────────────────────────────┘

# 透传字节范围请求头（格式：bytes=0-1023）
# 不透传则后端无法识别分片请求，断点续传失败，每次从头下载
proxy_set_header                Range                           $http_range;

# 透传条件范围请求头，与 Range 配合使用
# 资源已修改时返回完整内容，未修改则返回 206 Partial Content
proxy_set_header                If-Range                        $http_if_range;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第七组：内容协商                                                 │
# │  适用：多语言网站、压缩传输、内容类型选择                          │
# └──────────────────────────────────────────────────────────────────┘

# 透传客户端接受的内容类型（如 text/html, application/json）
proxy_set_header                Accept                          $http_accept;

# 透传客户端支持的压缩算法（如 gzip, br, deflate）
# 后端据此压缩响应，减少传输体积
proxy_set_header                Accept-Encoding                 $http_accept_encoding;

# 透传客户端首选语言（如 zh-CN,zh;q=0.9,en;q=0.8）
# 多语言网站后端据此返回对应语言内容
proxy_set_header                Accept-Language                 $http_accept_language;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第八组：跨域 / 防盗链                                            │
# │  适用：CORS 跨域请求、图片/视频防盗链、API 来源校验                │
# └──────────────────────────────────────────────────────────────────┘

# 透传请求来源域名（格式：https://app.yourdomain.com）
# CORS 场景：后端据此判断是否允许跨域，不透传则后端无法做 CORS 校验
proxy_set_header                Origin                          $http_origin;

# 透传来源页面完整 URL
# 防盗链：后端/CDN 据此判断是否为合法来源
proxy_set_header                Referer                         $http_referer;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第九组：User-Agent 透传                                          │
# │  适用：UA 检测、移动端适配、爬虫识别、统计分析                     │
# └──────────────────────────────────────────────────────────────────┘

# 透传客户端浏览器/应用标识字符串
# 后端据此做移动端适配、爬虫过滤、浏览器兼容性处理
proxy_set_header                User-Agent                      $http_user_agent;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十组：缓存协商头                                               │
# │  适用：CDN 回源、浏览器缓存验证、静态资源更新检测                  │
# └──────────────────────────────────────────────────────────────────┘

# 透传客户端缓存控制指令（如 no-cache、max-age=0）
# 强制刷新（Ctrl+F5）时发送 no-cache，后端据此跳过缓存返回最新内容
proxy_set_header                Cache-Control                   $http_cache_control;

# 透传条件请求头：资源上次修改时间
# 后端对比文件修改时间，未变化返回 304 Not Modified，减少传输
proxy_set_header                If-Modified-Since               $http_if_modified_since;

# 透传条件请求头：资源标签（ETag 值）
# 后端对比 ETag，未变化返回 304，比 If-Modified-Since 更精确
proxy_set_header                If-None-Match                   $http_if_none_match;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十一组：CORS 预检请求头透传                                    │
# │  适用：跨域 AJAX（OPTIONS 预检请求）                              │
# └──────────────────────────────────────────────────────────────────┘

# 透传 CORS 预检中客户端声明将使用的请求头列表
# 后端据此在响应中包含 Access-Control-Allow-Headers
proxy_set_header                Access-Control-Request-Headers  $http_access_control_request_headers;

# 透传 CORS 预检中客户端声明将使用的请求方法
# 后端据此在响应中包含 Access-Control-Allow-Methods
proxy_set_header                Access-Control-Request-Method   $http_access_control_request_method;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十二组：上传 / 下载限制                                        │
# │  适用：大文件上传、视频上传、分片上传                              │
# └──────────────────────────────────────────────────────────────────┘

# 不限制请求体大小（0 = 无限制）
# 默认值 1m，超过则 Nginx 返回 413 Request Entity Too Large
client_max_body_size            0;

# 客户端上传请求体超时时间
# 慢速网络大文件上传时防止因超时被断开
client_body_timeout             86400s;

# 关闭请求体缓冲：收到多少数据立即转发给后端
# 开启时 Nginx 会先把整个请求体缓存到磁盘再转发，大文件上传延迟高且占磁盘
proxy_request_buffering         off;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十三组：响应缓冲控制                                           │
# │  适用：视频流、WebSocket、SSE、SSH over WebSocket、实时推送        │
# └──────────────────────────────────────────────────────────────────┘

# 关闭响应缓冲：后端返回数据立即转发给客户端，不在 Nginx 内存中积累
# 视频流/WebSocket/SSE 场景必须关闭，否则客户端无法实时收到数据
proxy_buffering                 off;

# 读取后端响应头的缓冲区大小（与 proxy_buffering off 共存，影响头部读取）
proxy_buffer_size               16k;

# 读取后端响应体的缓冲区数量和单个大小
proxy_buffers                   4 32k;

# 向客户端发送数据时忙缓冲区的最大值
proxy_busy_buffers_size         64k;

# 缓冲区不足时写入临时文件的单次大小
proxy_temp_file_write_size      64k;

# 禁止使用临时文件缓冲（0 = 不写磁盘，纯内存/直接转发）
# 防止大文件响应占满磁盘
proxy_max_temp_file_size        0;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十四组：缓存完全禁用                                           │
# │  适用：动态内容、API 接口、需要实时数据的场景                      │
# └──────────────────────────────────────────────────────────────────┘

# 关闭代理缓存（不使用缓存区存储后端响应）
proxy_cache                     off;

# 不缓存响应到磁盘（即使配置了 proxy_cache_path 也不缓存此请求）
proxy_no_cache                  1;

# 强制绕过缓存直接请求后端（即使缓存中有数据也不使用）
proxy_cache_bypass              1;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十五组：超时设置                                               │
# │  适用：视频流、大文件下载、SSH 长连接、WebSocket 长连接            │
# └──────────────────────────────────────────────────────────────────┘

# 与后端建立 TCP 连接的超时时间（600s = 10分钟）
# 网络慢或后端负载高时适当加大，避免连接建立阶段就超时
proxy_connect_timeout           600s;

# 向后端发送请求数据的超时时间（每次写操作间隔，非总时间）
# 大文件上传慢速发送时防止超时断开
proxy_send_timeout              86400s;

# 从后端读取响应的超时时间（两次读操作间隔，非总时间）
# 视频流、大文件下载、SSH 长连接必须设置足够大
proxy_read_timeout              86400s;

# 与客户端保持长连接的超时时间，减少频繁建立 TCP 连接的开销
keepalive_timeout               600s;

# 向客户端发送响应的超时时间（两次写操作间隔）
# 客户端下载速度极慢时防止超时断开
send_timeout                    86400s;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十六组：文件传输优化                                           │
# └──────────────────────────────────────────────────────────────────┘

# 零拷贝文件传输：内核直接从磁盘发送到网络，不经用户空间，降低 CPU 占用
sendfile                        on;

# 与 sendfile 配合，等缓冲区满再发包，减少小包数量，提升网络效率
# 对实时性要求高的场景（WebSocket/终端）可能轻微增加延迟
tcp_nopush                      on;

# 禁用 Nagle 算法：有数据立即发送，不等待缓冲区
# 终端类应用（SSH over WebSocket、实时游戏）必须开启，减少输入延迟
tcp_nodelay                     on;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十七组：响应拦截与修改控制                                     │
# └──────────────────────────────────────────────────────────────────┘

# 不拦截后端错误响应，直接将后端错误透传给客户端
# 开启时 Nginx 会用自己的 error_page 替换后端错误响应，影响调试
proxy_intercept_errors          off;

# 不自动修改后端响应中的 Location 和 Refresh 头
# 开启时 Nginx 会将跳转地址中的域名替换为代理域名，关闭确保后端控制跳转
proxy_redirect                  off;

# 隐藏后端技术栈标识（如 PHP/7.4.x），避免暴露后端信息（可选）
proxy_hide_header               X-Powered-By;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十八组：Cookie 路径/域重写控制                                 │
# │  目标：默认不改写，开箱即用；需要时可按站点单独覆盖                │
# └──────────────────────────────────────────────────────────────────┘

# 默认关闭 Cookie 域名改写（保持后端 Set-Cookie 原样）
proxy_cookie_domain             off;

# 默认关闭 Cookie 路径改写（保持后端 Set-Cookie 原样）
proxy_cookie_path               off;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第十九组：请求细粒度限制（默认不限制）                            │
# │  目标：小白直接可用，不限速不截断                                  │
# └──────────────────────────────────────────────────────────────────┘

# 下行限速（0 = 不限速）
proxy_limit_rate                0;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第二十组：重试与连接复用细项                                     │
# │  目标：网络抖动时更稳，且不要求用户手工调参                        │
# └──────────────────────────────────────────────────────────────────┘

# 启用到上游的 TCP keepalive，长连接更稳定
proxy_socket_keepalive          on;

# 上游失败时允许自动重试（适用于 upstream 多节点场景）
proxy_next_upstream             error timeout invalid_header http_500 http_502 http_503 http_504;

# 重试总时长上限
proxy_next_upstream_timeout     30s;

# 最大重试次数（单上游时不会产生额外副作用）
proxy_next_upstream_tries       2;


# ┌──────────────────────────────────────────────────────────────────┐
# │  第二十一组：透传后端响应头                                        │
# │  默认 Nginx 会过滤部分响应头，以下明确允许透传给客户端            │
# └──────────────────────────────────────────────────────────────────┘

proxy_pass_header               Server;                          # 后端服务器标识
proxy_pass_header               Date;                            # 响应时间戳
proxy_pass_header               Content-Type;                    # 响应内容类型
proxy_pass_header               Content-Length;                  # 响应体字节数（下载进度）
proxy_pass_header               Content-Encoding;                # 压缩编码（gzip/br）
proxy_pass_header               Content-Range;                   # 分片范围（断点续传）
proxy_pass_header               Accept-Ranges;                   # 支持范围请求标识（断点续传）
proxy_pass_header               ETag;                            # 资源版本标签（缓存验证）
proxy_pass_header               Last-Modified;                   # 最后修改时间（缓存验证）
proxy_pass_header               Location;                        # 重定向地址（301/302）
proxy_pass_header               Refresh;                         # 定时刷新/跳转指令
proxy_pass_header               WWW-Authenticate;                # 401 认证挑战（Basic Auth）
proxy_pass_header               Set-Cookie;                      # Cookie 设置（登录态）
proxy_pass_header               Access-Control-Allow-Origin;     # CORS：允许的来源
proxy_pass_header               Access-Control-Allow-Methods;    # CORS：允许的方法
proxy_pass_header               Access-Control-Allow-Headers;    # CORS：允许的请求头
proxy_pass_header               Access-Control-Allow-Credentials; # CORS：是否允许携带凭证
proxy_pass_header               Access-Control-Expose-Headers;   # CORS：允许 JS 读取的头
proxy_pass_header               Access-Control-Max-Age;          # CORS：预检缓存时间


# ┌──────────────────────────────────────────────────────────────────┐
# │  第二十二组：SSL 后端（后端是 HTTPS 时取消注释）                    │
# │  适用：后端服务使用 HTTPS，或后端有自签名证书                     │
# └──────────────────────────────────────────────────────────────────┘

# proxy_ssl_verify                off;             # 不验证后端证书（自签名时使用）
# proxy_ssl_server_name           on;              # 启用 SNI，后端多证书场景必须
# proxy_ssl_name                  $proxy_host;     # SNI 握手时发送的服务器名称
# proxy_ssl_protocols             TLSv1.2 TLSv1.3; # 指定 TLS 版本
# proxy_ssl_session_reuse         on;              # 复用 SSL 会话，减少握手开销

# │  