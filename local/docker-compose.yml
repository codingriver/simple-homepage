# ============================================================
# 导航网站 Docker Compose 配置（本地构建专用）
# 此文件位于 local/ 目录，Dockerfile 在上级目录
# 使用方式：
#   cp local/.env.example local/.env   # 复制并编辑配置
#   bash local/docker-build.sh         # 构建并启动
# 或手动：
#   docker compose -f local/docker-compose.yml up -d
#   docker compose -f local/docker-compose.yml down
#   docker compose -f local/docker-compose.yml logs -f
# ============================================================

services:
  nav:
    build:
      context: ..              # Dockerfile 在上级项目根目录
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Shanghai}
        # 可选：与 GitHub Actions 一致注入，便于镜像内显示构建 commit（默认 unknown）
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_REF: ${GIT_REF:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/codingriver/simple-homepage}
    image: codingriver/simple-homepage:latest
    container_name: ${CONTAINER_NAME:-simple-homepage}
    restart: unless-stopped

    ports:
      - "${NAV_PORT:-58080}:58080"

    environment:
      - NAV_PORT=58080     # 容器内部默认端口 58080（host 模式更不易冲突）
      - TZ=${TZ:-Asia/Shanghai}
      - PUID=${PUID:-}
      - PGID=${PGID:-}

    volumes:
      # ── 持久化数据目录（必须挂载，否则重建容器数据丢失）──
      - ${DATA_DIR:-../data}:/var/www/nav/data

      # ── 可选：挂载自定义 Nginx 反代配置 ──
      # - ../nav-proxy.conf:/etc/nginx/conf.d/nav-proxy.conf

      # ── 可选：挂载日志到宿主机 ──
      # - ../logs/nginx:/var/log/nginx
      # - ../logs/php-fpm:/var/log/php-fpm

    # 关闭健康检查（不周期性请求 /login.php，避免写 request_timing 等）
    healthcheck:
      disable: true

    labels:
      - "com.simple-homepage.version=latest"
      - "com.simple-homepage.description=Simple Homepage navigation site"

# ============================================================
# 常用命令
# ============================================================
# bash local/docker-build.sh                              # 推荐：一键构建+启动
# docker compose -f local/docker-compose.yml up -d --build  # 手动构建并启动
# docker compose -f local/docker-compose.yml down           # 停止
# docker compose -f local/docker-compose.yml logs -f        # 查看日志
# docker compose -f local/docker-compose.yml ps             # 查看状态
# docker compose -f local/docker-compose.yml restart        # 重启
