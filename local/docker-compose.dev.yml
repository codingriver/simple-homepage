# ============================================================
# RiverOps Docker Compose 开发覆盖配置（代码热更新）
# 推荐入口（在项目根目录）：
#   bash local/docker-build.sh dev
# 说明：local/README.md
# ============================================================

services:
  riverops:
    environment:
      # 开发模式：启用内置测试管理员 qatest / qatest2026（生产 compose 勿设置）
      RIVEROPS_DEV_MODE: "1"

    volumes:
      # 开发模式：挂载整个项目代码，修改 PHP/CSS/JS 后可直接生效
      - ..:/var/www/riverops

      # 保持数据目录独立持久化（覆盖上面的 /var/www/riverops/data）
      - ${DATA_DIR:-../data}:/var/www/riverops/data

      # 开发环境 PHP 配置（仅开发模式生效）
      - ./php-dev.ini:/usr/local/etc/php/conf.d/98-riverops-dev.ini
