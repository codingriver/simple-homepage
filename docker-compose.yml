# ============================================================
# 官方一键部署（推荐新手）
# 启动: docker compose up -d
# 停止: docker compose down
# 日志: docker compose logs -f
# ============================================================

services:
  simple-homepage:
    image: codingriver/simple-homepage:latest
    container_name: simple-homepage
    restart: unless-stopped

    ports:
      - "58080:58080"

    environment:
      # 容器内默认端口（与端口映射保持一致）
      NAV_PORT: "58080"
      TZ: "Asia/Shanghai"
      # 可选：显式覆盖运行用户 UID/GID；留空时容器启动后自动按 data 目录 owner 对齐
      PUID: "${PUID:-}"
      PGID: "${PGID:-}"
      # 可选：出站 API 代理。DigitalPlat 等平台若对容器出口触发 Cloudflare challenge，可透传宿主机可用代理。
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      NO_PROXY: "${NO_PROXY:-}"
      no_proxy: "${no_proxy:-}"
      ALL_PROXY: "${ALL_PROXY:-}"
      all_proxy: "${all_proxy:-}"

    volumes:
      # 必须挂载：用户、配置、日志、备份都在这里
      - ./data:/var/www/nav/data
      # 挂载 Nginx 站点配置，便于本地调整容器默认站点
      - ./nginx-conf:/var/www/nav/nginx-conf:ro
      # - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      disable: true
