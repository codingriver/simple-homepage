# ============================================================
# 导航网站 Docker Compose 配置
# 使用方式：
#   cp .env.example .env       # 复制并编辑配置
#   docker compose up -d       # 启动
#   docker compose down        # 停止
#   docker compose logs -f     # 查看日志
# ============================================================

services:
  nav:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Shanghai}
    image: codingriver/simple-homepage:latest
    container_name: ${CONTAINER_NAME:-nav-portal}
    restart: unless-stopped

    ports:
      - "${NAV_PORT:-8080}:80"

    environment:
      - NAV_PORT=80          # 容器内部端口固定 80，外部由 NAV_PORT 映射
      - TZ=${TZ:-Asia/Shanghai}

    volumes:
      # ── 持久化数据目录（必须挂载，否则重建容器数据丢失）──
      - ${DATA_DIR:-./nav-data}:/var/www/nav/data

      # ── 可选：挂载自定义 Nginx 反代配置 ──
      # - ./nav-proxy.conf:/etc/nginx/conf.d/nav-proxy.conf

      # ── 可选：挂载日志到宿主机 ──
      # - ./logs/nginx:/var/log/nginx
      # - ./logs/php-fpm:/var/log/php-fpm

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/login.php"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

    # 资源限制（可选，防止单容器占用过多资源）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 256M
    #     reservations:
    #       memory: 64M

    labels:
      - "com.nav-portal.version=latest"
      - "com.nav-portal.description=Nav Portal Navigation Site"

# ── 使用命名卷（可选，替代上方 bind mount）──
# volumes:
#   nav-data:
#     driver: local

# ============================================================
# 常用命令（优先使用 docker compose，旧环境可改用 docker-compose）
# ============================================================
# docker compose up -d --build    # 构建并启动（Docker CLI 插件）
# docker-compose up -d --build    # 构建并启动（旧版独立安装）
# docker compose down             # 停止
# docker compose logs -f          # 查看日志
# docker compose ps               # 查看状态
# docker compose restart          # 重启
