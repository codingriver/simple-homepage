<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS 解析管理 — 后台系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0f14;
      --surface:      #141820;
      --surface2:     #1c2230;
      --surface3:     #222a3a;
      --border:       #2a3347;
      --border2:      #364055;
      --accent:       #4f9cf9;
      --accent2:      #7c5cfc;
      --accent-glow:  rgba(79,156,249,0.18);
      --success:      #34d399;
      --warning:      #fbbf24;
      --danger:       #f87171;
      --text:         #e2e8f0;
      --text2:        #94a3b8;
      --text3:        #64748b;
      --font-sans:    'Syne', system-ui, sans-serif;
      --font-mono:    'DM Mono', 'Fira Code', monospace;
      --radius:       10px;
      --radius-lg:    16px;
      --shadow:       0 4px 24px rgba(0,0,0,0.35);
      --transition:   all 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Layout ────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    /* ─── Topbar ────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .topbar-logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo span {
      display: inline-block;
      width: 22px; height: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
    }
    .topbar-sep { flex: 1; }
    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }

    /* ─── Sidebar ───────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: var(--text3);
      text-transform: uppercase;
      padding: 14px 20px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13.5px;
      color: var(--text2);
      cursor: pointer;
      border-radius: 0;
      transition: var(--transition);
      position: relative;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: var(--surface2);
      color: var(--accent);
      font-weight: 600;
    }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    /* ─── Main ──────────────────────────────────────────── */
    .main {
      padding: 28px 32px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Page Header ───────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .page-title small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text3);
      margin-top: 2px;
      letter-spacing: 0;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ─── Account Bar ───────────────────────────────────── */
    .account-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .account-label {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
      white-space: nowrap;
    }

      display: flex;
      align-items: center;
