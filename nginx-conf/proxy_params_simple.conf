# ══════════════════════════════════════════════════════════════════════
# Nginx 精简增强反代参数模板 - proxy_params_simple
# 用法：location / { proxy_pass http://后端IP; include /var/www/nav/data/nginx/proxy-params-simple.conf; }
# 目标：开箱即用，覆盖基础站点 + 下载器 + 视频站点常见需求（不含 HTTPS 上游参数）
# ══════════════════════════════════════════════════════════════════════

# ── 基础协议与多层反代透传 ──
proxy_http_version              1.1;
proxy_set_header                Upgrade                         $http_upgrade;
proxy_set_header                Connection                      "upgrade";
proxy_set_header                Host                            $host;
proxy_set_header                X-Real-IP                       $remote_addr;
proxy_set_header                X-Forwarded-For                 $proxy_add_x_forwarded_for;
proxy_set_header                X-Forwarded-Proto               $scheme;
proxy_set_header                X-Forwarded-Host                $host;
proxy_set_header                X-Forwarded-Port                $server_port;

# ── 下载器/视频站点基础支持（断点续传）──
proxy_set_header                Range                           $http_range;
proxy_set_header                If-Range                        $http_if_range;
proxy_pass_header               Accept-Ranges;
proxy_pass_header               Content-Range;
proxy_pass_header               Content-Length;
proxy_pass_header               Content-Type;
proxy_pass_header               Content-Encoding;

# ── 常用会话/重定向头透传 ──
proxy_pass_header               Set-Cookie;
proxy_pass_header               Location;
proxy_pass_header               WWW-Authenticate;

# ── 超时与上传下载体积（通用保守值）──
proxy_connect_timeout           30s;
proxy_send_timeout              1800s;
proxy_read_timeout              1800s;
send_timeout                    1800s;
client_max_body_size            2g;

# ── 缓冲策略（默认开启，兼顾通用性能）──
proxy_request_buffering         on;
proxy_buffering                 on;
proxy_buffer_size               32k;
proxy_buffers                   8 64k;
proxy_busy_buffers_size         128k;
proxy_max_temp_file_size        0;

# ── 连接稳定性（默认开）──
proxy_socket_keepalive          on;
proxy_next_upstream             error timeout invalid_header http_500 http_502 http_503 http_504;
proxy_next_upstream_timeout     15s;
proxy_next_upstream_tries       2;

# ── 其他安全/行为默认 ──
proxy_intercept_errors          off;
proxy_redirect                  off;
proxy_hide_header               X-Powered-By;
