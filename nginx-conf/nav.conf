# Nginx 配置文件 — 导航网站
# 保存到：/etc/nginx/sites-available/nav.conf
# 启用：ln -s /etc/nginx/sites-available/nav.conf /etc/nginx/sites-enabled/

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nav.yourdomain.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nav.yourdomain.com;

    # SSL 证书（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/nav.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nav.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Web 根目录指向 public/
    root  /var/www/nav/public;
    index index.php login.php;

    # 安全头
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # 禁止直接访问数据目录
    location ~* ^/\..*            { deny all; }
    location ~* \.(json|sh|md)$  { deny all; }

    # Nginx auth_request 内部验证接口
    # 注意：internal 指令确保外部无法直接访问
    location = /auth/verify.php {
        internal;
        fastcgi_pass            unix:/run/php/php8.2-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass_request_body off;
        fastcgi_param           CONTENT_LENGTH "";
        include                 fastcgi_params;
    }

    # 后台管理目录
    location ^~ /admin/ {
        alias /var/www/nav/admin/;

        # 验证登录（auth_request 调用 verify.php）
        auth_request /auth/verify.php;
        # 未登录时跳转登录页
        error_page 401 = @login_redirect;

        location ~ \.php$ {
            fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/nav/admin$fastcgi_script_name;
            include       fastcgi_params;
        }
    }

    # 未登录跳转处理
    location @login_redirect {
        return 302 /login.php?redirect=$request_uri;
    }

    # PHP 文件处理
    location ~ \.php$ {
        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    # 静态文件缓存
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 默认路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 访问日志
    access_log /var/log/nginx/nav.access.log;
    error_log  /var/log/nginx/nav.error.log;
}

