# 后台管理 Nginx 站点配置（Docker 容器内）
# 版本：v0.0.2 | 仅保留后台管理功能

server {
    listen ${NAV_PORT} default_server;
    listen [::]:${NAV_PORT} default_server;
    server_name _;

    root  /var/www/nav/public;
    index index.php login.php;

    # ── 安全响应头 ──
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options  nosniff;
    add_header Referrer-Policy        "strict-origin-when-cross-origin";

    # ── 禁止访问敏感文件和目录 ──
    location ~* \.(json|sh|md|log)$  { deny all; }
    location ~ /\.                   { deny all; }
    location ~ ^/data/               { deny all; }
    location ~ ^/shared/             { deny all; }

    # 浏览器会自动请求站点根 favicon.ico，返回 204 占位避免噪声
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # ── Nginx auth_request 内部验证端点 ──
    location = /auth/verify.php {
        internal;
        fastcgi_pass              unix:/run/php-fpm.sock;
        fastcgi_param             SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass_request_body off;
        fastcgi_param             CONTENT_LENGTH "";
        include                   fastcgi_params;
        fastcgi_param             HTTP_X_REAL_IP        $http_x_real_ip;
        fastcgi_param             HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
        fastcgi_param             HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout   10s;
        fastcgi_send_timeout      30s;
        fastcgi_read_timeout      30s;
    }

    # ── 后台管理（需登录鉴权）──
    location = /admin/ {
        return 302 /admin/index.php;
    }

    location ^~ /admin/ {
        auth_request /auth/verify.php;
        error_page 401 = @login_redirect;

        location ~ \.php$ {
            auth_request off;
            fastcgi_pass  unix:/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/nav$fastcgi_script_name;
            include       fastcgi_params;
            fastcgi_param HTTP_X_REAL_IP        $http_x_real_ip;
            fastcgi_param HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout    60s;
            fastcgi_read_timeout    60s;
        }

        location ~* \.(css|js|png|jpg|gif|svg|woff2?)$ {
            auth_request off;
            root /var/www/nav;
        }

        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location @login_redirect {
        return 302 /login.php?redirect=$request_uri;
    }

    # ── PHP 处理 ──
    location ~ \.php$ {
        fastcgi_pass            unix:/run/php-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_param           HTTP_X_REAL_IP        $remote_addr;
        fastcgi_param           HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
        fastcgi_param           HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ── 静态资源缓存 ──
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = / {
        return 302 /admin/index.php;
    }

    location / {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    access_log off;
    error_log  /var/log/nginx/nav.error.log;
}
