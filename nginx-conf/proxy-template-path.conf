# ══════════════════════════════════════════════════════════════════════
# Nginx 反代配置模板 — 路径模式
# 用法：此模板用于生成每个路径前缀代理站点的 location 块
# 注意：生成的 location 块会被 include 到主站 server {} 内，
#       因此模板本身只能是 location 级别指令，不能写 server 顶层指令。
# ══════════════════════════════════════════════════════════════════════

    # {{name}}
    location /p/{{slug}}/ {
        if ($cookie_nav_session = "") { return 302 /login.php?redirect=$request_uri; }
        auth_request      /auth/verify.php;
        error_page 401  = @login_redirect;
        proxy_pass        {{target}}/;
        include           {{params_file}};
    }
