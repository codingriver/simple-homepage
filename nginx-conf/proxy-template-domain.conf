# ══════════════════════════════════════════════════════════════════════
# Nginx 反代配置模板 — 子域名模式
# 用法：此模板用于生成每个子域名代理站点的独立 server 块
# ══════════════════════════════════════════════════════════════════════

server {
    listen {{port}};
    listen [::]:{{port}};
    server_name {{domain}};
    absolute_redirect off;

    location = /auth/verify {
        internal;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nav/public/auth/verify.php;
        fastcgi_pass_request_body off;
        fastcgi_param CONTENT_LENGTH "";
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
    }

    location = /login.php {
        auth_request off;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nav/public/login.php;
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    location = /login.css {
        auth_request off;
        root /var/www/nav/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /gesture-guard.js {
        auth_request off;
        root /var/www/nav/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

{{profile_static_locations}}
    location / {
        auth_request /auth/verify;
        error_page 401 = @nav_login;
        proxy_pass {{target}};
{{profile_location_directives}}
    }

    location @nav_login {
        return 302 /login.php?redirect=$nav_forwarded_proto://$http_host$request_uri;
    }
}
