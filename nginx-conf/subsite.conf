# ============================================================
# Nginx 配置 —— 子站通用模板
# 复制此文件，替换 server_name 和 root 路径即可复用
# ============================================================

server {
    listen 80;
    server_name blog.yourdomain.com;  # 修改为你的子站域名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.yourdomain.com;  # 修改为你的子站域名

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/nav-portal/blog;   # 修改为你的子站根目录
    index index.php index.html;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # 禁止外部直接访问（只允许携带有效 Token 的请求）
    # 注意：PHP 层已做 Token 校验，Nginx 层做双重保险
    # 如果没有 Cookie 且没有 _nav_token 参数，返回 403
    # （可选，PHP 层已够用，此处注释掉默认不启用）
    # if ($cookie_nav_session = "") {
    #     if ($arg__nav_token = "") {
    #         return 302 https://nav.yourdomain.com/login.php;
    #     }
    # }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # 禁止访问 data 目录（存放 users.json 等敏感文件）
    location ~* /data/ {
        deny all;
    }
}
