# 导航站自动生成的 Nginx 子域名代理配置
# 生成时间：{{GENERATED_AT}}
# 此文件由后台自动管理，请勿手动编辑

# ── 子域名模式 ──
server {
    listen 58080;
    listen [::]:58080;
    server_name app.local.303066.xyz;
    absolute_redirect off;

    location = /auth/verify {
        internal;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nav/public/auth/verify.php;
        fastcgi_pass_request_body off;
        fastcgi_param CONTENT_LENGTH "";
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
    }

    location = /login.php {
        auth_request off;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nav/public/login.php;
        include fastcgi_params;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    location = /login.css {
        auth_request off;
        root /var/www/nav/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /gesture-guard.js {
        auth_request off;
        root /var/www/nav/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        auth_request /auth/verify;
        error_page 401 = @nav_login;
        proxy_pass http://192.168.2.2:10086;
        include {{DATA_DIR}}/nginx/proxy-params-simple.conf;
    }

    location @nav_login {
        return 302 /login.php?redirect=$nav_forwarded_proto://$http_host$request_uri;
    }
}

