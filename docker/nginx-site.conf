# 导航网站 Nginx 站点配置（Docker 容器内）
# 版本：v2.3 | 反代参数内置，proxy 配置由后台自动管理

server {
    listen ${NAV_PORT};
    listen [::]:${NAV_PORT};
    server_name _;

    root  /var/www/nav/public;
    index index.php login.php;

    # ── 安全响应头 ──
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options  nosniff;
    add_header Referrer-Policy        "strict-origin-when-cross-origin";

    # ── 禁止访问敏感文件和目录 ──
    location ~* \.(json|sh|md|log)$  { deny all; }
    location ~ /\.                   { deny all; }
    location ~ ^/data/               { deny all; }
    location ~ ^/shared/             { deny all; }

    # favicon.ico → 重定向到 favicon.php（避免 404 日志刷屏）
    location = /favicon.ico {
        rewrite ^ /favicon.php last;
    }

    # ── Nginx auth_request 内部验证端点 ──
    location = /auth/verify.php {
        internal;
        fastcgi_pass              unix:/run/php-fpm.sock;
        fastcgi_param             SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass_request_body off;
        fastcgi_param             CONTENT_LENGTH "";
        include                   fastcgi_params;
        fastcgi_param             HTTP_X_REAL_IP        $http_x_real_ip;
        fastcgi_param             HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
        fastcgi_param             HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout   10s;
        fastcgi_send_timeout      30s;
        fastcgi_read_timeout      30s;
    }

    # ── 后台管理（需登录鉴权）──
    location ^~ /admin/ {
        auth_request /auth/verify.php;
        error_page 401 = @login_redirect;

        location ~ \.php$ {
            auth_request off;
            fastcgi_pass  unix:/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/nav$fastcgi_script_name;
            include       fastcgi_params;
            fastcgi_param HTTP_X_REAL_IP        $http_x_real_ip;
            fastcgi_param HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout    60s;
            fastcgi_read_timeout    60s;
        }

        # 静态资源（css/js 等）：关闭 auth_request，避免每个资源多一次 /auth/verify.php 子请求（与主页面叠加会明显变慢）
        location ~* \.(css|js|png|jpg|gif|svg|woff2?)$ {
            auth_request off;
            root /var/www/nav;
        }

        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location @login_redirect {
        return 302 /login.php?redirect=$request_uri;
    }

    # ── PHP 处理 ──
    location ~ \.php$ {
        fastcgi_pass            unix:/run/php-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include                 fastcgi_params;
        # 将上游反代透传的真实 IP 头转发给 PHP
        # 容器内 $remote_addr 是 Docker 网关 IP，真实 IP 在这两个头里
        fastcgi_param           HTTP_X_REAL_IP        $http_x_real_ip;
        fastcgi_param           HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
        fastcgi_param           HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ── 静态资源缓存 ──
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── 反代配置（由后台自动管理）──
    # 此文件通过 include 嵌入，只能包含 location 块
    # 每个 location 块已内置完整的 proxy 参数：
    #   - auth_request 鉴权
    #   - proxy_http_version 1.1
    #   - WebSocket Upgrade/Connection 头
    #   - Host / X-Real-IP / X-Forwarded-For / X-Forwarded-Proto
    #   - proxy_connect/send/read 超时
    # 新增代理站点后，点击「生成配置并 Reload Nginx」即可自动生效
    include /etc/nginx/conf.d/nav-proxy.conf;

    access_log /var/log/nginx/nav.access.log;
    error_log  /var/log/nginx/nav.error.log;
}
