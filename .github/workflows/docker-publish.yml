name: Build and Push Docker Image

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/smoke:test

      - name: Run smoke test
        run: |
          chmod +x .github/scripts/smoke-test.sh
          ./.github/scripts/smoke-test.sh smoke-report.txt local/smoke:test

      - name: Publish smoke summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f smoke-report.txt ]; then
            RESULT="$(awk -F': ' '/^result:/{print $2}' smoke-report.txt | tail -n1)"
            TOTAL="$(awk -F': ' '/^total:/{print $2}' smoke-report.txt | tail -n1)"
            PASS="$(awk -F': ' '/^pass:/{print $2}' smoke-report.txt | tail -n1)"
            FAIL="$(awk -F': ' '/^fail:/{print $2}' smoke-report.txt | tail -n1)"
            SKIP="$(awk -F': ' '/^skip:/{print $2}' smoke-report.txt | tail -n1)"

            if [ "$RESULT" = "PASS" ]; then
              echo "✅ **Result: PASS**" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ **Result: FAIL**" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Total cases | ${TOTAL:-N/A} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ✅ Pass | ${PASS:-N/A} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ❌ Fail | ${FAIL:-N/A} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ⏭ Skip | ${SKIP:-N/A} |" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Case Details" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            awk '/^## Results/{found=1;next} found && /^## /{exit} found{print}' smoke-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full smoke-report.txt</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat smoke-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ smoke-report.txt not found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: smoke-report.txt
          retention-days: 14

  docker:
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: codingriver/simple-homepage
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: codingriver/simple-homepage
          short-description: "A simple self-hosted navigation homepage with Docker support"
          readme-filepath: ./README.md
